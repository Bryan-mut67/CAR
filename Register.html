<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your AquaShine account. Join us and get your car sparkling clean with our premium wash services.">
  <title>Register - AquaShine Car Wash</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <!-- Left Side - Form -->
    <div class="auth-form-section">
      <div class="auth-form-container">
        <!-- Mobile Logo -->
        <div class="auth-mobile-logo">
          <a href="index.html" class="auth-image-logo" style="display: inline-flex; gap: 0.5rem; align-items: center;">
            <div class="auth-image-logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
                <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
              </svg>
            </div>
            <span class="auth-image-logo-text text-gradient">AquaShine</span>
          </a>
        </div>

        <div class="auth-form-header">
          <h1 class="font-display">Create Account</h1>
          <p>Join us and get your car sparkling clean</p>
        </div>

        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label class="label" for="register-name">Full Name</label>
            <div class="input-icon">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" class="input" id="register-name" placeholder="Mercedes Benz" required>
            </div>
          </div>

          <div class="form-group">
            <label class="label" for="register-email">Email Address</label>
            <div class="input-icon">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <input type="email" class="input" id="register-email" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <label class="label" for="register-phone">Phone Number</label>
            <div class="input-icon">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <input type="tel" class="input" id="register-phone" placeholder="+254 700,000,000" required>
            </div>
          </div>

          <div class="form-group">
            <label class="label" for="register-password">Password</label>
            <div class="input-icon" style="position: relative;">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" class="input" id="register-password" placeholder="••••••••" required style="padding-right: 2.75rem;">
              <button type="button" class="password-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="label" for="confirm-password">Confirm Password</label>
            <div class="input-icon">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" class="input" id="confirm-password" placeholder="••••••••" required>
            </div>
          </div>

          <button type="submit" class="btn btn-hero btn-lg" style="width: 100%;">
            Create Account
          </button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>

    <!-- Right Side - Image -->
    <div class="auth-image">
      <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1920&q=80" alt="Car wash">
      <div class="auth-image-overlay right"></div>
      <div class="auth-image-content">
        <div class="auth-image-inner right">
          <a href="index.html" class="auth-image-logo right">
            <span class="auth-image-logo-text text-gradient">AquaShine</span>
            <div class="auth-image-logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
                <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
              </svg>
            </div>
          </a>
          <h2 class="font-display">Join Our Community</h2>
          <p>Register your vehicle and enjoy exclusive member benefits.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
