<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your AquaShine account to manage your car wash bookings and preferences.">
  <title>Login - AquaShine Car Wash</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <!-- Left Side - Image -->
    <div class="auth-image">
      <img src="https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?w=1920&q=80" alt="Car wash">
      <div class="auth-image-overlay left"></div>
      <div class="auth-image-content">
        <div class="auth-image-inner">
          <a href="index.html" class="auth-image-logo">
            <div class="auth-image-logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
                <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
              </svg>
            </div>
            <span class="auth-image-logo-text text-gradient">AquaShine</span>
          </a>
          <h2 class="font-display">Premium Car Wash Experience</h2>
          <p>Join thousands of satisfied customers who trust us with their vehicles.</p>
        </div>
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="auth-form-section">
      <div class="auth-form-container">
        <!-- Mobile Logo -->
        <div class="auth-mobile-logo">
          <a href="index.html" class="auth-image-logo" style="display: inline-flex; gap: 0.5rem; align-items: center;">
            <div class="auth-image-logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
                <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
              </svg>
            </div>
            <span class="auth-image-logo-text text-gradient">AquaShine</span>
          </a>
        </div>

        <div class="auth-form-header">
          <h1 class="font-display">Welcome Back</h1>
          <p>Sign in to your account to continue</p>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label class="label" for="login-email">Email Address</label>
            <div class="input-icon">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <input type="email" class="input" id="login-email" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <label class="label" for="login-password">Password</label>
            <div class="input-icon" style="position: relative;">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" class="input" id="login-password" placeholder="••••••••" required style="padding-right: 2.75rem;">
              <button type="button" class="password-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="auth-form-row">
            <label class="auth-remember">
              <input type="checkbox">
              Remember me
            </label>
            <a href="#" class="auth-forgot">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-hero btn-lg" style="width: 100%;">
            Sign In
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Create account</a>
        </p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
